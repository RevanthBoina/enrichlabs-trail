<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="bgGrad2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0618"/>
    </radialGradient>
    <radialGradient id="glow3" cx="35%" cy="45%" r="22%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow4" cx="65%" cy="55%" r="18%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="glow2x">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad2)"/>
  
  <!-- Ambient glows -->
  <ellipse cx="280" cy="270" rx="180" ry="140" fill="url(#glow3)"/>
  <ellipse cx="520" cy="330" rx="150" ry="110" fill="url(#glow4)"/>
  
  <!-- Content nodes - left side (source content) -->
  <g transform="translate(100, 300)">
    <!-- Node 1 -->
    <rect x="-30" y="-60" width="60" height="40" rx="8" fill="#1e1030" stroke="#a855f7" stroke-width="1.5"/>
    <text x="0" y="-35" fill="#e879f9" font-size="10" text-anchor="middle" font-family="sans-serif">BLOG</text>
    <!-- Node 2 -->
    <rect x="-30" y="-10" width="60" height="40" rx="8" fill="#1e1030" stroke="#9333ea" stroke-width="1.5"/>
    <text x="0" y="15" fill="#d946ef" font-size="10" text-anchor="middle" font-family="sans-serif">ADS</text>
    <!-- Node 3 -->
    <rect x="-30" y="40" width="60" height="40" rx="8" fill="#1e1030" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="0" y="65" fill="#c084fc" font-size="10" text-anchor="middle" font-family="sans-serif">EMAIL</text>
  </g>
  
  <!-- Connection lines from source to hub -->
  <g stroke-width="2" fill="none" opacity="0.7" filter="url(#glow2x)">
    <path d="M170 240 Q250 250 300 280" stroke="#a855f7" marker-end="url(#arrowhead)"/>
    <path d="M170 290 L300 300" stroke="#9333ea" marker-end="url(#arrowhead)"/>
    <path d="M170 340 Q250 330 300 320" stroke="#7c3aed" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Central hub node -->
  <g transform="translate(400, 300)">
    <circle r="50" fill="#1e1030" stroke="#a855f7" stroke-width="2"/>
    <circle r="35" fill="#2d1a4a" stroke="#9333ea" stroke-width="1.5"/>
    <text y="-5" fill="#e879f9" font-size="12" text-anchor="middle" font-family="sans-serif" font-weight="bold">AI</text>
    <text y="12" fill="#c084fc" font-size="10" text-anchor="middle" font-family="sans-serif">PIPELINE</text>
    <!-- Glowing ring -->
    <circle r="50" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="50;55;50" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Connection lines from hub to output channels -->
  <g stroke-width="2" fill="none" opacity="0.7" filter="url(#glow2x)">
    <path d="M450 280 Q500 200 560 180" stroke="#a855f7" marker-end="url(#arrowhead)"/>
    <path d="M450 300 Q550 300 600 300" stroke="#9333ea" marker-end="url(#arrowhead)"/>
    <path d="M450 320 Q500 400 560 420" stroke="#7c3aed" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- Output channels - right side -->
  <g transform="translate(700, 300)">
    <!-- Channel 1 - CMS -->
    <rect x="-30" y="-80" width="60" height="40" rx="8" fill="#1e1030" stroke="#a855f7" stroke-width="1.5"/>
    <text x="0" y="-55" fill="#e879f9" font-size="9" text-anchor="middle" font-family="sans-serif">CMS</text>
    <!-- Channel 2 - Ads -->
    <rect x="-30" y="-10" width="60" height="40" rx="8" fill="#1e1030" stroke="#9333ea" stroke-width="1.5"/>
    <text x="0" y="15" fill="#d946ef" font-size="9" text-anchor="middle" font-family="sans-serif">ADS</text>
    <!-- Channel 3 - ESP -->
    <rect x="-30" y="60" width="60" height="40" rx="8" fill="#1e1030" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="0" y="85" fill="#c084fc" font-size="9" text-anchor="middle" font-family="sans-serif">ESP</text>
  </g>
  
  <!-- Floating data particles along connections -->
  <g opacity="0.7">
    <circle cx="220" cy="260" r="3" fill="#e879f9" filter="url(#glow2x)">
      <animate attributeName="cx" values="220;280;300" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="260;270;280" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="250" r="3" fill="#d946ef" filter="url(#glow2x)">
      <animate attributeName="cx" values="480;530;560" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="250;220;200" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="350" r="3" fill="#c084fc" filter="url(#glow2x)">
      <animate attributeName="cx" values="480;530;560" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="350;380;400" dur="1.3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Decorative particles -->
  <g opacity="0.5">
    <circle cx="150" cy="150" r="2" fill="#c4b5fd" filter="url(#glow2x)"/>
    <circle cx="650" cy="150" r="2" fill="#e879f9" filter="url(#glow2x)"/>
    <circle cx="150" cy="450" r="2" fill="#a78bfa" filter="url(#glow2x)"/>
    <circle cx="650" cy="450" r="2" fill="#d946ef" filter="url(#glow2x)"/>
    <circle cx="300" cy="100" r="1.5" fill="#a855f7" filter="url(#glow2x)"/>
    <circle cx="500" cy="500" r="1.5" fill="#c084fc" filter="url(#glow2x)"/>
  </g>
  
  <!-- Grid overlay -->
  <g opacity="0.04" stroke="#a855f7" stroke-width="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>
</svg>